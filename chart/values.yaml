nameOverride: ""
fullnameOverride: ""

secret:
  create: true
  name: obtrace-sdk
  apiKey: ""

config:
  create: true
  name: obtrace-sdk-config
  tenantId: "tenant-dev"
  projectId: "project-dev"
  env: "dev"

# Optional demo workload for quick validation.
# Keep disabled when integrating into an existing app deployment.
workload:
  enabled: false
  kind: Deployment
  name: checkout-api
  image: "ghcr.io/acme/checkout-api:latest"
  imagePullPolicy: IfNotPresent
  replicas: 2
  containerPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  extraEnv: []
