name: Release

on:
  push:
    tags: ["v*"]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  auto-tag:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: obtrace-runners
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      created: ${{ steps.tag.outputs.created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: tag
        run: |
          VERSION=$(grep '^version:' chart/Chart.yaml | awk '{print $2}')
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    if: >-
      always() &&
      ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (needs.auto-tag.result == 'success' && needs.auto-tag.outputs.created == 'true'))
    needs: [auto-tag]
    runs-on: obtrace-runners
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.tag || github.ref_name }}

      - uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push Helm chart
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version:.*/version: $VERSION/" chart/Chart.yaml
          helm package chart --version "$VERSION"
          helm push obtrace-sdk-integration-${VERSION}.tgz oci://ghcr.io/obtraceai/charts
